
tab_bar_edge bottom
confirm_os_window_close 1

scrollback_lines 3000
repaint_delay 10
input_delay 2
sync_to_monitor yes
enable_audio_bell no

# window_logo_path ~/.config/kitty/image.png
# window_logo_position bottom-right
# window_logo_scale 8
# window_logo_alpha 0.2

background_opacity 0.7
initial_window_width 1280
initial_window_height 720
remember_window_size no
remember_window_position no


wheel_scroll_min_lines 1
scrollbar_hover_width 1
scrollbar hovered
scrollbar_jump_on_click yes
mouse_hide_wait 0


font_size 12.0
# font_family      family="Hack Nerd Font"
# bold_font        auto
# italic_font      auto
# bold_italic_font auto


cursor #cccccc
cursor_text_color #111111
cursor_beam_thickness 1.0
cursor_underline_thickness 1.5
cursor_blink_interval 1


url_color #0087bd
url_style curly
underline_hyperlinks hover
open_url_with default
detect_urls yes
show_hyperlink_targets yes
url_prefixes file ftp ftps git http https irc ircs kitty mailto sftp ssh

strip_trailing_spaces smart